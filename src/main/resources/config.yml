# ========================================
#     Chest Collector - Configuration
# ========================================
# Place special chest blocks that automatically collect nearby dropped items!
# Perfect for farms, mob grinders, and keeping your world tidy.

# ========================================
#        Collector Chest Settings
# ========================================
collector:
  # Maximum number of collectors each player can place
  # Higher values allow more collectors per player
  # Default: 5
  max-per-player: 5

  # Default collection radius (in blocks) for new collectors
  # This is the initial radius when a collector is first placed
  # Players can adjust this per-collector in the UI
  # Default: 10
  default-radius: 10

  # Maximum collection radius (in blocks) allowed
  # Players cannot set their collectors above this radius
  # Keep this reasonable to avoid performance issues
  # Default: 32
  max-radius: 32

  # How often (in seconds) collectors scan for and collect items
  # Lower values = more frequent collection (but more server load)
  # Higher values = less frequent collection (but better performance)
  # Default: 2
  collection-interval: 2

  # Notification type when items are collected
  # Options:
  #   "NOTIFICATION" - Shows in-game notification popup
  #   "CHAT"         - Sends chat message
  #   "TITLE"        - Shows title on screen
  #   "NONE"         - No notification (silent collection)
  # Default: NOTIFICATION
  notification-type: "NOTIFICATION"

# ========================================
#           Auto Pickup Settings
# ========================================
autopickup:
  # Enable or disable the autopickup feature globally
  # If disabled, no player can use autopickup
  # Default: true
  enabled: true

  # Default state for new players
  # true = autopickup is enabled by default for new players
  # false = players must manually enable it with /autopickup
  # Default: false
  default-enabled: false

  # Disable autopickup for players in creative mode
  # Prevents accidental item pickup while building
  # Default: true
  disable-in-creative: true

  # Delay before items are picked up (in ticks, 20 ticks = 1 second)
  # 0 = instant pickup
  # Higher values add a small delay before pickup
  # Default: 0
  pickup-delay-ticks: 0

  # Notification type when items are auto-picked up
  # Options:
  #   "NOTIFICATION" - Shows in-game notification popup (side notification)
  #   "TITLE"        - Shows title on screen (larger, center display)
  #   "CHAT"         - Sends chat message
  #   "NONE"         - No notification (silent pickup)
  # Default: NOTIFICATION
  notification-type: "NOTIFICATION"

  # Notification type when /autopickup command is toggled
  # This controls how the enable/disable feedback is shown to the player
  # Options:
  #   "TITLE"        - Shows title on screen (larger, center display)
  #   "NOTIFICATION" - Shows in-game notification popup (side notification)
  #   "CHAT"         - Sends chat message
  #   "NONE"         - No feedback message
  # Default: TITLE
  toggle-notification-type: "TITLE"

  # ========================================
  #     Whitelist/Blacklist Configuration
  # ========================================
  # You can use EITHER whitelist OR blacklist mode (not both at the same time)
  #
  # WHITELIST MODE: Only blocks in the whitelist will be auto-picked up
  #   - Set whitelist-enabled: true
  #   - Set blacklist-enabled: false
  #   - Add block patterns to the whitelist
  #   - All other blocks will drop normally
  #
  # BLACKLIST MODE: All blocks except those in the blacklist will be auto-picked up
  #   - Set whitelist-enabled: false
  #   - Set blacklist-enabled: true
  #   - Add block patterns to the blacklist
  #   - All other blocks will be auto-picked up
  #
  # DISABLED MODE: All blocks will be auto-picked up (no filtering)
  #   - Set both whitelist-enabled: false and blacklist-enabled: false
  #
  # Pattern Matching: All patterns use case-insensitive partial matching
  #   Example: "trunk" matches "Tree_Oak_Trunk", "Tree_Birch_Trunk", etc.
  #   Example: "ore" matches "Stone_Iron_Ore", "Stone_Gold_Ore", etc.
  #   Example: "chest" matches any block with "chest" in its ID
  # ========================================

  # Enable whitelist mode (only listed blocks will be auto-picked up)
  whitelist-enabled: false

  # Enable blacklist mode (listed blocks will NOT be auto-picked up)
  blacklist-enabled: false

  # Whitelist: Only these block patterns will be auto-picked up when whitelist-enabled is true
  # Common examples for gathering resources:
  whitelist:
    - "ore"          # All ores (iron, gold, copper, etc.)
    - "trunk"        # All tree trunks
    - "log"          # All logs
    - "stone"        # Stone blocks
    - "dirt"         # Dirt blocks
    - "sand"         # Sand blocks
    - "gravel"       # Gravel blocks
    # Add more patterns as needed

  # Blacklist: These block patterns will NOT be auto-picked up when blacklist-enabled is true
  # Common examples to prevent accidental pickup:
  blacklist:
    - "chest"        # Prevent picking up chests
    - "furniture"    # Prevent picking up furniture
    - "crafting"     # Prevent picking up crafting benches
    - "door"         # Prevent picking up doors
    - "gate"         # Prevent picking up gates
    # Add more patterns as needed
